services:
  backend:
    build: ./backend
    container_name: acql-backend
    ports:
      - "5007:5000"
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=sqlite:////app/data/acquisition_lifecycle.db
      - SECRET_KEY=dev-secret
      - JWT_SECRET_KEY=jwt-dev-secret
    volumes:
      - acql-data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: acql-frontend
    ports:
      - "6005:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  acql-data:
